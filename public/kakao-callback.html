<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카카오 인가 완료</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 32px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    h1 { font-size: 22px; margin: 0 0 12px; color: #111; }
    p { color: #555; line-height: 1.6; }
    .code-box {
      background: #f4f4f5;
      border-radius: 8px;
      padding: 16px;
      font-family: ui-monospace, Menlo, monospace;
      font-size: 13px;
      word-break: break-all;
      margin: 16px 0;
      border: 1px solid #e5e5e5;
    }
    .err { color: #c00; }
    .ok  { color: #0a6; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">처리 중...</h1>
    <p id="desc">카카오로부터 돌아온 인가 정보를 확인하고 있습니다.</p>
    <div class="code-box" id="code">-</div>
    <p id="hint" style="font-size: 13px; color: #888;">이 페이지는 Claude가 자동으로 읽어갑니다.</p>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const error = params.get('error');
      const errDesc = params.get('error_description');

      const titleEl = document.getElementById('title');
      const descEl = document.getElementById('desc');
      const codeEl = document.getElementById('code');

      window.__kakaoAuth = {
        code: code,
        error: error,
        errorDescription: errDesc,
        fullUrl: window.location.href,
        receivedAt: new Date().toISOString()
      };

      if (error) {
        titleEl.textContent = '인가 실패';
        titleEl.className = 'err';
        descEl.textContent = errDesc || error;
        codeEl.textContent = 'error: ' + error;
      } else if (code) {
        titleEl.textContent = '인가 성공';
        titleEl.className = 'ok';
        descEl.textContent = '인가 코드를 받았습니다. 창을 닫지 말고 잠시만 기다려주세요.';
        codeEl.textContent = code;
      } else {
        titleEl.textContent = '파라미터 없음';
        descEl.textContent = 'URL에 code 또는 error 파라미터가 없습니다.';
        codeEl.textContent = window.location.href;
      }
    })();
  </script>
</body>
</html>
